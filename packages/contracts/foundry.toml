[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read", path = "./addresses.arc-testnet.json" },
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"
